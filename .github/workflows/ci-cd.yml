name: Django CI-CD
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: djaret-ecr-pro
  ECR_REGISTRY: 884916644426.dkr.ecr.eu-west-1.amazonaws.com
  S3_BUCKET: djaret-s3-pro

jobs:
  CI-CD:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::884916644426:role/djaret-github-actions-role-pro
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login \
              --username AWS \
              --password-stdin $ECR_REGISTRY

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Collect static files
        run: |
          python manage.py collectstatic --noinput

      - name: Generate image tag
        id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Upload static files to S3
        run: |
          aws s3 sync staticfiles/ s3://$S3_BUCKET/static/ --delete

      - name: Inject RUM releaseId
        run: |
          sed -i "s/__RELEASE_ID__/$SHORT_SHA/" frontend/index.html

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/ s3://$S3_BUCKET/ \
            --exclude "static/*" \
            --cache-control "public, max-age=300"

      - name: Purge CloudFront cache
        run: |
          aws cloudfront create-invalidation \
          --distribution-id E2I5LTCI5TE945 \
          --paths "/*"

      - name: Build & push Docker image (arm64)
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --sbom=false \
            --output type=image,oci-mediatypes=false,push=true \
            -t $ECR_REGISTRY/$ECR_REPOSITORY/djaret:$SHORT_SHA \
            .

      - name: Update Lambda image
        run: |
          aws lambda update-function-code \
            --function-name djaret-lambda-pro \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY/djaret:$SHORT_SHA