name: Django CI-CD
on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'terraform/**'
      - '**.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'terraform/**'
      - '**.md'

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: djaret-ecr-pro
  ECR_REGISTRY: 884916644426.dkr.ecr.eu-west-1.amazonaws.com
  S3_BUCKET: djaret-s3-pro
  TFSTATE_BUCKET: djaret-tfstate
  TFSTATE_LOCK_KEY: env:/pro/terraform.tfstate.tflock

jobs:
  CI-CD:
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: write
      security-events: write
    steps:
      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::884916644426:role/djaret-github-actions-role-pro
          aws-region: ${{ env.AWS_REGION }}

      - name: Acquire Terraform state lock
        id: tflock
        if: github.event_name == 'push'
        run: |
          lock_id=$(cat /proc/sys/kernel/random/uuid)
          printf '{"ID":"%s","Operation":"ci-cd","Who":"gha-run-%s","Created":"%s","Path":"%s/env:/pro/terraform.tfstate"}' \
            "$lock_id" "$GITHUB_RUN_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$TFSTATE_BUCKET" > /tmp/tflock.json
          for i in $(seq 1 30); do
            if aws s3api put-object --bucket "$TFSTATE_BUCKET" --key "$TFSTATE_LOCK_KEY" \
                 --if-none-match '*' --content-type application/json --body /tmp/tflock.json 2>/tmp/tflock.err; then
              echo "acquired=true" >> "$GITHUB_OUTPUT"
              echo "lock_id=$lock_id" >> "$GITHUB_OUTPUT"
              echo "Terraform state lock acquired (id=$lock_id)."
              exit 0
            fi
            if grep -q 'PreconditionFailed' /tmp/tflock.err; then
              echo "State lock held by another process; retry $i/30 in 10s..."
              sleep 10
            else
              echo "::error::Unexpected error acquiring state lock:"; cat /tmp/tflock.err; exit 1
            fi
          done
          echo "::error::Timed out acquiring Terraform state lock after 5 min."; exit 1

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login \
              --username AWS \
              --password-stdin $ECR_REGISTRY

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Collect static files
        run: |
          python manage.py collectstatic --noinput

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Trivy pipeline misconfig scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.71.0
          scan-type: config
          scan-ref: .github/workflows/ci-cd.yml
          format: sarif
          output: trivy-pipeline.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          exit-code: 1

      - name: Upload Trivy SARIF (pipeline)
        if: always() && hashFiles('trivy-pipeline.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-pipeline.sarif
          category: trivy-pipeline

      - name: Generate image tag
        id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Upload static files to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync staticfiles/ s3://$S3_BUCKET/static/ --delete

      - name: Inject RUM releaseId
        run: |
          sed -i "s/__RELEASE_ID__/$SHORT_SHA/" frontend/index.html

      - name: Upload frontend to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync frontend/ s3://$S3_BUCKET/ \
            --exclude "static/*" \
            --cache-control "public, max-age=300"

      - name: Purge CloudFront cache
        if: github.event_name == 'push'
        run: |
          aws cloudfront create-invalidation \
          --distribution-id E2I5LTCI5TE945 \
          --paths "/*"

      - name: Build Docker image (arm64, local load)
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --provenance=false \
            --sbom=false \
            --load \
            -t $ECR_REGISTRY/$ECR_REPOSITORY/djaret:$SHORT_SHA \
            .

      - name: Trivy image scan (gate on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.71.0
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}/djaret:${{ env.SHORT_SHA }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          ignore-unfixed: true
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Push Docker image to ECR
        if: github.event_name == 'push'
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY/djaret:$SHORT_SHA

      - name: Update Lambda image
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name djaret-lambda-pro \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY/djaret:$SHORT_SHA

      - name: Sync image tag into Terraform
        if: github.event_name == 'push'
        run: |
          echo "image_tag = \"$SHORT_SHA\"" > terraform/image.auto.tfvars
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/image.auto.tfvars
          git diff --cached --quiet || git commit -m "ci: set lambda image_tag to $SHORT_SHA [skip ci]"
          git push

      - name: Release Terraform state lock
        if: always() && steps.tflock.outputs.acquired == 'true'
        env:
          OUR_LOCK_ID: ${{ steps.tflock.outputs.lock_id }}
        run: |
          if ! aws s3api get-object --bucket "$TFSTATE_BUCKET" --key "$TFSTATE_LOCK_KEY" /tmp/cur.json >/dev/null 2>&1; then
            echo "Lock object already gone; nothing to release."
            exit 0
          fi
          current_id=$(jq -r '.ID // empty' /tmp/cur.json)
          if [ "$current_id" = "$OUR_LOCK_ID" ]; then
            aws s3api delete-object --bucket "$TFSTATE_BUCKET" --key "$TFSTATE_LOCK_KEY"
            echo "Terraform state lock released (id=$OUR_LOCK_ID)."
          else
            echo "::warning::Lock id mismatch (current='$current_id', ours='$OUR_LOCK_ID'); not ours, leaving it."
          fi