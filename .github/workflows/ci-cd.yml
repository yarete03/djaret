name: Django CI-CD
on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'terraform/**'
      - '**.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'terraform/**'
      - '**.md'

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: djaret-ecr-pro
  ECR_REGISTRY: 884916644426.dkr.ecr.eu-west-1.amazonaws.com
  S3_BUCKET: djaret-s3-pro

concurrency:
  group: djaret-infra-lock
  cancel-in-progress: false

jobs:
  CI-CD:
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::884916644426:role/djaret-github-actions-role-pro
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login \
              --username AWS \
              --password-stdin $ECR_REGISTRY

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Collect static files
        run: |
          python manage.py collectstatic --noinput

      - name: Generate image tag
        id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Upload static files to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync staticfiles/ s3://$S3_BUCKET/static/ --delete

      - name: Inject RUM releaseId
        run: |
          sed -i "s/__RELEASE_ID__/$SHORT_SHA/" frontend/index.html

      - name: Upload frontend to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync frontend/ s3://$S3_BUCKET/ \
            --exclude "static/*" \
            --cache-control "public, max-age=300"

      - name: Purge CloudFront cache
        if: github.event_name == 'push'
        run: |
          aws cloudfront create-invalidation \
          --distribution-id E2I5LTCI5TE945 \
          --paths "/*"

      - name: Build & push Docker image (arm64)
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
          PUSH: ${{ github.event_name == 'push' }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --provenance=false \
            --sbom=false \
            --output type=image,oci-mediatypes=false,push=$PUSH \
            -t $ECR_REGISTRY/$ECR_REPOSITORY/djaret:$SHORT_SHA \
            .

      - name: Update Lambda image
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name djaret-lambda-pro \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY/djaret:$SHORT_SHA

      - name: Sync image tag into Terraform
        if: github.event_name == 'push'
        run: |
          echo "image_tag = \"$SHORT_SHA\"" > terraform/image.auto.tfvars
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/image.auto.tfvars
          git diff --cached --quiet || git commit -m "ci: set lambda image_tag to $SHORT_SHA [skip ci]"
          git push