name: Terraform Infra

on:
  push:
    branches: [ master ]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  TF_WORKSPACE: pro

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::884916644426:role/djaret-terraform-role-pro
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.2"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: SonarQube Cloud scan (Terraform IaC + pipeline)
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=yarete03
            -Dsonar.projectKey=djaret-terraform
            -Dsonar.sources=terraform,.github/workflows/terraform.yml
            -Dsonar.exclusions=**/.terraform/**,**/*.tfstate,**/*.tfstate.*,terraform/tfplan
            -Dsonar.qualitygate.wait=true

      - name: Trivy IaC misconfig scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.71.0
          scan-type: config
          scan-ref: terraform
          skip-dirs: '**/.terraform/**'
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          exit-code: 1

      - name: Upload Trivy SARIF (IaC)
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Trivy pipeline misconfig scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.71.0
          scan-type: config
          scan-ref: .github/workflows/terraform.yml
          format: sarif
          output: trivy-pipeline.sarif
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          exit-code: 1

      - name: Upload Trivy SARIF (pipeline)
        if: always() && hashFiles('trivy-pipeline.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-pipeline.sarif
          category: trivy-pipeline

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=10m -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1
          if-no-files-found: error

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::884916644426:role/djaret-terraform-role-pro
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.2"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -input=false -lock-timeout=10m tfplan
